<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Luxury | The Particle Art</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@100;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000; /* একদম কালো ব্যাকগ্রাউন্ড */
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* স্ক্রল বন্ধ */
            height: 100vh;
        }

        /* ৩ডি ক্যানভাস */
        #webgl-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* কন্টেন্টের পেছনে থাকবে */
        }

        /* মেইন কন্টেন্ট wrapper */
        .content-wrapper {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none; /* মাউস যেন ৩ডি ক্যানভাসে লাগে */
        }

        /* বিশাল লাক্সারি টেক্সট */
        .huge-text {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(4rem, 15vw, 12rem);
            line-height: 0.8;
            text-transform: uppercase;
            letter-spacing: -5px;
            background: linear-gradient(180deg, #fff 0%, #333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
            transition: 0.5s ease;
        }

        .huge-text:hover {
            opacity: 1;
            letter-spacing: 5px;
        }

        /* সাবটাইটেল */
        .tagline {
            font-size: 14px;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-top: 20px;
            color: rgba(255,255,255,0.4);
            font-weight: 100;
        }

        /* প্রিমিয়াম বাটন */
        .cta-container {
            margin-top: 100px;
            pointer-events: auto; /* বাটন ক্লিক করার জন্য */
        }

        .btn-luxury {
            padding: 25px 70px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-size: 11px;
            border-radius: 100px;
            cursor: pointer;
            transition: background 0.5s;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .btn-luxury::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-luxury:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 50px rgba(255,255,255,0.1);
        }

        .btn-luxury:hover::after {
            left: 100%;
        }

        /* কাস্টম কার্সার */
        #cursor {
            position: fixed;
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.3s, height 0.3s;
        }

    </style>
</head>
<body>

    <div id="cursor"></div>

    <canvas id="webgl-canvas"></canvas>

    <div class="content-wrapper">
        <h1 class="huge-text">INFINITE<br>VOID</h1>
        <p class="tagline">DEFINING DIGITAL ARTISTRY</p>
        
        <div class="cta-container">
            <button class="btn-luxury" id="magneticBtn">Explore the Void</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Three.js সেটিং এবং ইন্টারঅ্যাকশন লজিক
        let scene, camera, renderer, sphere;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;

        function init() {
            // ১. সিন (Scene) তৈরি
            scene = new THREE.Scene();

            // ২. ক্যামেরা (Camera) তৈরি
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3.5;

            // ৩. রেন্ডারার (Renderer) তৈরি
            const canvas = document.getElementById('webgl-canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // ৪. অবজেক্ট (3D Particle Object) তৈরি - একটি আইকোসাহেড্রন জিওমেট্রি (বেশি ডিটেইলড)
            const geometry = new THREE.IcosahedronGeometry(2, 20);
            
            // লাক্সারি মেটেরিয়াল (Particle point system)
            const material = new THREE.PointsMaterial({ 
                color: 0x333333, // কালো-ধূসর কণা
                size: 0.015,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending, // চমৎকার গ্লো ইফেক্ট
                depthWrite: false
            });
            
            sphere = new THREE.Points(geometry, material);
            scene.add(sphere);

            // ৫. মাউস মুভমেন্ট এবং কার্সার লিসেনার
            document.addEventListener('mousemove', onDocumentMouseMove);
            window.addEventListener('resize', onWindowResize);

            // ৬. ম্যাগনেটিক বাটন লজিক
            const btn = document.getElementById('magneticBtn');
            btn.parentElement.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.4}px, ${y * 0.6}px)`; // বাটন চুম্বকের মতো নড়বে
            });
            btn.parentElement.addEventListener('mouseleave', () => {
                btn.style.transform = `translate(0px, 0px)`; // মাউস চলে গেলে ঠিক হয়ে যাবে
            });

            animate();
        }

        function onDocumentMouseMove(event) {
            mouseX = (event.clientX - windowHalfX) / 100;
            mouseY = (event.clientY - windowHalfY) / 100;
            
            // কাস্টম কার্সার পজিশন
            const cursor = document.getElementById('cursor');
            cursor.style.left = event.clientX + 'px';
            cursor.style.top = event.clientY + 'px';
        }

        function onWindowResize() {
            windowHalfX = window.innerWidth / 2;
            windowHalfY = window.innerHeight / 2;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ৭. এনিমেশন লুপ (Liquid Smooth Dynamics)
        function animate() {
            requestAnimationFrame(animate);

            // স্মুথ মাউস ফলোইং (Damping)
            targetX = mouseX * 0.5;
            targetY = mouseY * 0.5;

            sphere.rotation.y += 0.002; // সাধারণ ধীর ঘূর্ণন
            
            // মাউস অনুযায়ী অবজেক্টের হালকা পজিশন পরিবর্তন
            sphere.position.x += (targetX - sphere.position.x) * 0.05;
            sphere.position.y += (-targetY - sphere.position.y) * 0.05;

            renderer.render(scene, camera);
        }

        // শুরু করা
        init();

        // কার্সার হোভার এফেক্ট
        const btn = document.querySelector('.btn-zenith');
        const cursor = document.getElementById('cursor');
        btn.addEventListener('mouseenter', () => {
            cursor.style.width = '50px';
            cursor.style.height = '50px';
            cursor.style.background = 'rgba(255,255,255,0.1)';
        });
        btn.addEventListener('mouseleave', () => {
            cursor.style.width = '15px';
            cursor.style.height = '15px';
            cursor.style.background = '#fff';
        });

    </script>
</body>
</html>
